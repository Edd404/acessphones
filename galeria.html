<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a0a;--bg:#fafafa;--surface:#fff;--border:#e8e8e8;
  --text:#0a0a0a;--soft:#a0a0a0;--muted:#5a5a5a;
  --gold:#b8964e;--gold-l:#d4b06a;--gold-pale:#f5edd8;
  --r:16px;
}
body.dark{
  --bg:#0f0f0f;--surface:#181818;--border:#252525;
  --text:#f0f0f0;--soft:#4a4a4a;--muted:#888;--gold-pale:#1c1810;
}
html{scroll-behavior:smooth}
body{
  font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);
  min-height:100dvh;-webkit-font-smoothing:antialiased;
  padding-bottom:calc(66px + env(safe-area-inset-bottom));
  transition:background .3s,color .3s;overflow-x:hidden;
}

/* ── LOADING ── */
.loading{position:fixed;inset:0;z-index:9999;background:#0a0a0a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;}
.loading::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 45% at 50% 65%,rgba(184,150,78,.06) 0%,transparent 70%);pointer-events:none;}
.ld-wrap{display:flex;flex-direction:column;align-items:center;gap:28px;animation:ldIn .8s cubic-bezier(.4,0,.2,1)}
@keyframes ldIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.ld-logo{height:52px;filter:invert(1);opacity:.9}
.ld-rule{width:44px;height:1px;background:linear-gradient(90deg,transparent,rgba(184,150,78,.55),transparent)}
.ld-dots{display:flex;gap:7px}
.ld-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:ldP 1.4s ease infinite}
.ld-dot:nth-child(2){animation-delay:.22s}.ld-dot:nth-child(3){animation-delay:.44s}
@keyframes ldP{0%,100%{opacity:.15;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:200;background:rgba(250,250,250,.93);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);transition:background .3s;}
body.dark .hdr{background:rgba(15,15,15,.93)}
.hdr-main{padding:12px 16px;display:flex;align-items:center;gap:10px}
.hdr-back{width:34px;height:34px;border-radius:50%;background:var(--surface);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;text-decoration:none;color:var(--text);
  -webkit-tap-highlight-color:transparent;transition:all .2s;flex-shrink:0;}
.hdr-back:active{transform:scale(.88)}
.hdr-info{flex:1}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;letter-spacing:.01em}
.hdr-sub{font-size:11px;color:var(--soft);margin-top:1px}
.hdr-acts{display:flex;gap:7px}
.ibtn{width:34px;height:34px;border-radius:50%;background:var(--surface);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:15px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.ibtn:active{transform:scale(.88)}

/* Search */
.search-wrap{padding:0 16px 10px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface);
  border:1.5px solid var(--border);border-radius:12px;padding:0 12px;transition:border-color .2s;}
.search-box:focus-within{border-color:var(--gold)}
.search-input{flex:1;border:none;background:transparent;font-family:'Outfit',sans-serif;
  font-size:14px;color:var(--text);padding:9px 0;outline:none;}
.search-input::placeholder{color:var(--soft)}

/* Gen filter chips */
.gen-scroll{display:flex;gap:7px;overflow-x:auto;padding:0 16px 12px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;}
.gen-scroll::-webkit-scrollbar{display:none}
.gen-chip{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:11px;font-weight:700;
  cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);
  -webkit-tap-highlight-color:transparent;transition:all .2s;letter-spacing:.02em;}
.gen-chip:active{transform:scale(.94)}
.gen-chip.active{border-color:transparent;color:#fff;}

/* ── SYNC BAR ── */
.sync-bar{text-align:center;font-size:10px;font-weight:600;letter-spacing:.06em;padding:4px 20px}
.sync-bar.online{background:rgba(26,110,63,.08);color:#1a6e3f}
.sync-bar.local{background:rgba(184,150,78,.08);color:var(--gold)}
body.dark .sync-bar.online{background:rgba(61,184,112,.1);color:#3db870}

/* ── MAIN ── */
.main{padding:16px 0 8px}

/* Generation section */
.gen-section{margin-bottom:24px}
.gen-hdr{display:flex;align-items:center;gap:10px;padding:0 16px 12px;}
.gen-badge{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;}
.gen-label{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--text)}
.gen-year{font-size:11px;color:var(--soft);margin-left:auto}

/* Models horizontal scroll */
.models-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 16px 4px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;}
.models-scroll::-webkit-scrollbar{display:none}

/* Model card */
.model-card{flex-shrink:0;width:130px;border-radius:16px;overflow:hidden;
  background:var(--surface);border:1px solid var(--border);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:all .2s;position:relative;}
.model-card:active{transform:scale(.95)}

.model-thumb{width:130px;height:130px;background:var(--border);position:relative;overflow:hidden;}
.model-thumb-img{width:100%;height:100%;object-fit:cover;transition:opacity .3s;}
.model-thumb-empty{
  width:100%;height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:6px;
  background:linear-gradient(135deg,#f5f5f5 0%,#ebebeb 100%);}
body.dark .model-thumb-empty{background:linear-gradient(135deg,#1e1e1e 0%,#2a2a2a 100%)}
.model-thumb-empty-ico{font-size:28px;opacity:.25}
.model-thumb-empty-txt{font-size:9px;color:var(--soft);font-weight:500;letter-spacing:.04em;text-transform:uppercase}

.model-count-badge{position:absolute;top:7px;right:7px;
  background:rgba(0,0,0,.65);backdrop-filter:blur(4px);
  color:#fff;font-size:9px;font-weight:700;
  padding:2px 7px;border-radius:10px;letter-spacing:.03em;}

.model-info{padding:8px 10px 10px}
.model-name{font-size:11px;font-weight:700;color:var(--text);line-height:1.3;letter-spacing:-.01em}
.model-year{font-size:10px;color:var(--soft);margin-top:1px}

/* ── DETAIL VIEW ── */
.detail-view{
  position:fixed;inset:0;z-index:300;background:var(--bg);
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
.detail-view.open{transform:translateX(0)}
.detail-hdr{
  padding:max(14px,calc(10px + env(safe-area-inset-top))) 16px 12px;
  display:flex;align-items:center;gap:12px;
  background:rgba(250,250,250,.93);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
body.dark .detail-hdr{background:rgba(15,15,15,.93)}
.detail-back{width:34px;height:34px;border-radius:50%;background:var(--surface);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s;}
.detail-back:active{transform:scale(.88)}
.detail-hdr-info{flex:1}
.detail-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500}
.detail-sub{font-size:11px;color:var(--soft);margin-top:1px}

.detail-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}

/* Photo grid */
.photo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:16px}
.photo-cell{aspect-ratio:1;border-radius:12px;overflow:hidden;position:relative;
  cursor:pointer;-webkit-tap-highlight-color:transparent;background:var(--border);}
.photo-cell:active{transform:scale(.95)}
.photo-cell img{width:100%;height:100%;object-fit:cover;transition:opacity .3s}
.photo-cell-caption{
  position:absolute;bottom:0;left:0;right:0;padding:5px 6px;
  background:linear-gradient(to top,rgba(0,0,0,.75),transparent);
  font-size:9px;color:rgba(255,255,255,.85);font-weight:500;
  line-height:1.3;
}
.photo-delete{position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;
  background:rgba(239,68,68,.85);border:none;color:#fff;font-size:11px;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;}
.detail-body.edit-mode .photo-delete{display:flex}
.detail-body.edit-mode .photo-cell{border:2px dashed rgba(239,68,68,.3)}

/* Upload button in grid */
.upload-cell{aspect-ratio:1;border-radius:12px;border:2px dashed var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s;background:transparent;}
.upload-cell:active{transform:scale(.95);border-color:var(--gold)}
.upload-cell-ico{font-size:22px;opacity:.35}
.upload-cell-txt{font-size:9px;color:var(--soft);font-weight:600;letter-spacing:.04em;text-transform:uppercase}

/* Empty detail state */
.detail-empty{display:flex;flex-direction:column;align-items:center;gap:14px;padding:48px 20px;text-align:center}
.detail-empty-ico{font-size:48px;opacity:.2}
.detail-empty-title{font-size:15px;font-weight:600;color:var(--text)}
.detail-empty-sub{font-size:13px;color:var(--soft);line-height:1.5}

/* ── UPLOAD SHEET ── */
.up-overlay{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.6);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:flex-end;}
.up-overlay.open{display:flex}
.up-sheet{width:100%;background:var(--bg);border-radius:24px 24px 0 0;
  padding:0 20px calc(28px + env(safe-area-inset-bottom));max-height:85dvh;overflow-y:auto;}
.up-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 18px}
.up-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;margin-bottom:4px}
.up-sub{font-size:12px;color:var(--soft);margin-bottom:18px}
.form-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--soft);margin-bottom:7px;display:block}
.form-input{width:100%;background:var(--surface);border:1.5px solid var(--border);
  border-radius:12px;padding:11px 14px;font-family:'Outfit',sans-serif;font-size:14px;
  color:var(--text);outline:none;transition:border-color .2s;margin-bottom:14px;}
.form-input:focus{border-color:var(--gold)}
.form-input::placeholder{color:var(--soft)}

/* Preview grid in upload */
.up-preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.up-prev-cell{aspect-ratio:1;border-radius:10px;overflow:hidden;position:relative;background:var(--border);}
.up-prev-cell img{width:100%;height:100%;object-fit:cover}
.up-prev-remove{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;
  background:rgba(239,68,68,.9);border:none;color:#fff;font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}

.up-drop{width:100%;min-height:100px;border-radius:14px;border:2px dashed var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s;margin-bottom:14px;}
.up-drop:active{border-color:var(--gold)}
.up-actions{display:flex;gap:10px;margin-top:4px}
.btn-cancel{flex:1;padding:13px;border-radius:14px;background:var(--surface);
  border:1.5px solid var(--border);font-family:'Outfit',sans-serif;font-size:14px;
  font-weight:600;color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s;}
.btn-save{flex:2;padding:13px;border-radius:14px;background:var(--black);border:none;
  font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;color:#fafafa;
  cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s;}
body.dark .btn-save{background:var(--gold);color:#000}
.btn-cancel:active,.btn-save:active{transform:scale(.97)}
.btn-save:disabled{opacity:.4;pointer-events:none}

/* ── LIGHTBOX ── */
.lb-overlay{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.97);
  display:none;flex-direction:column;opacity:0;transition:opacity .25s;}
.lb-overlay.open{display:flex;opacity:1}
.lb-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:max(16px,env(safe-area-inset-top)) 16px 10px;flex-shrink:0;}
.lb-title{font-family:'Cormorant Garamond',serif;font-size:17px;color:#fff;font-weight:400}
.lb-caption{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.lb-close{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.1);
  border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lb-body{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.lb-img-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none;}
.lb-img{max-width:100%;max-height:100%;object-fit:contain;user-select:none;-webkit-user-select:none;pointer-events:none;}
/* Nav arrows */
.lb-prev,.lb-next{position:absolute;top:50%;transform:translateY(-50%);z-index:1;
  width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.12);border:none;
  color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;transition:all .2s;}
.lb-prev{left:8px}.lb-next{right:8px}
.lb-prev:active,.lb-next:active{background:rgba(255,255,255,.25)}
.lb-counter{position:absolute;top:50%;left:50%;transform:translate(-50%,calc(-50% + 60px));
  font-size:11px;color:rgba(255,255,255,.35);pointer-events:none;}
.lb-footer{padding:12px 16px calc(20px + env(safe-area-inset-bottom));
  display:flex;gap:8px;flex-shrink:0;}
.lb-btn{flex:1;padding:12px;border-radius:13px;border:none;font-family:'Outfit',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;}
.lb-btn-wa{background:#25d366;color:#fff}
.lb-btn-copy{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15)}
.lb-btn-dl{background:rgba(184,150,78,.15);color:var(--gold);border:1px solid rgba(184,150,78,.3)}
.lb-btn:active{transform:scale(.95);opacity:.85}



body.dark

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(76px + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--black);color:#fafafa;padding:9px 18px;border-radius:20px;
  font-size:13px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:3000;white-space:nowrap;}
body.dark .toast{background:var(--gold);color:#000}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes pgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.page-wrap{animation:pgIn .3s ease}
input[type=file]{display:none}




/* ── BOTTOM NAV ── */
.bnav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(250,250,250,.93);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;overflow-x:auto;scrollbar-width:none;
  padding:6px 0 calc(6px + env(safe-area-inset-bottom));
  transition:background .3s;
}
.bnav::-webkit-scrollbar{display:none}
body.dark .bnav{background:rgba(15,15,15,.93)}
.bni{
  flex:0 0 64px;display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;padding:3px 0;text-decoration:none;
}
.bni:active{opacity:.6}
.bni-ico{font-size:18px;transition:transform .2s}
.bni-lbl{font-size:9px;font-weight:600;letter-spacing:.03em;color:var(--soft);white-space:nowrap}
.bni.active .bni-lbl{color:var(--black)}
body.dark .bni.active .bni-lbl{color:var(--gold)}
.bni.active .bni-ico{transform:scale(1.15)}
</style>

<body>

<!-- LOADING -->

      <input class="search-input" id="search-input" type="text" placeholder="Buscar modelo..." oninput="onSearch(this.value)">
    </div>
  </div>
  <div class="gen-scroll" id="gen-scroll"></div>
</header>

<div class="sync-bar local" id="sync-bar" style="display:none"></div>

<!-- MAIN GRID -->
<div class="page-wrap" id="main-wrap" style="display:none">
  <div class="main" id="main-grid"></div>
</div>

<!-- DETAIL VIEW -->
<div class="detail-view" id="detail-view">
  <div class="detail-hdr">
    <button class="detail-back" onclick="closeDetail()">‹</button>
    <div class="detail-hdr-info">
      <div class="detail-title" id="detail-title">Modelo</div>
      <div class="detail-sub" id="detail-sub">0 fotos</div>
    </div>
    <div style="display:flex;gap:7px">
      <button class="ibtn" id="edit-mode-btn" onclick="toggleEditMode()" title="Gerenciar fotos">✏️</button>
      <button class="ibtn" onclick="openUpload()" title="Adicionar fotos">+</button>
    </div>
  </div>
  <div class="detail-body" id="detail-body">
    <div class="photo-grid" id="photo-grid"></div>
  </div>
</div>

<!-- UPLOAD SHEET -->
<div class="up-overlay" id="up-overlay">
  <div class="up-sheet">
    <div class="up-handle"></div>
    <div class="up-title" id="up-title">Adicionar Fotos</div>
    <div class="up-sub" id="up-sub">Escolha as fotos do modelo</div>
    <div class="up-preview-grid" id="up-preview-grid"></div>
    <div class="up-drop" id="up-drop" onclick="$('up-input').click()">
      <div style="font-size:28px;opacity:.3">📷</div>
      <div style="font-size:12px;color:var(--soft)">Toque para adicionar fotos</div>
      <div style="font-size:10px;color:var(--soft);opacity:.7">Múltiplas fotos de uma vez</div>
    </div>
    <input type="file" id="up-input" accept="image/*" multiple onchange="handleFiles(event)">
    <div class="form-group" style="margin-top:4px">
      <label class="form-label">Legenda (opcional)</label>
      <input class="form-input" id="f-caption" type="text" placeholder='Ex: "256GB Preto — R$ 3.200"'>
    </div>
    <div style="font-size:11px;color:var(--soft);text-align:center;margin-bottom:12px" id="up-info"></div>
    <div class="up-actions">
      <button class="btn-cancel" onclick="closeUpload()">Cancelar</button>
      <button class="btn-save" id="btn-save-photos" onclick="savePhotos()" disabled>Salvar Fotos</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lb-overlay" id="lb-overlay">
  <div class="lb-hdr">
    <div>
      <div class="lb-title" id="lb-title"></div>
      <div class="lb-caption" id="lb-caption"></div>
    </div>
    <button class="lb-close" onclick="closeLb()">✕</button>
  </div>
  <div class="lb-body" style="position:relative">
    <div class="lb-img-wrap" id="lb-img-wrap">
      <img class="lb-img" id="lb-img" src="" alt="">
    </div>
    <button class="lb-prev" id="lb-prev" onclick="lbNav(-1)">‹</button>
    <button class="lb-next" id="lb-next" onclick="lbNav(1)">›</button>
    <div class="lb-counter" id="lb-counter"></div>
  </div>
  <div class="lb-footer">
    <button class="lb-btn lb-btn-wa" onclick="lbWhatsApp()">💬 WhatsApp</button>
    <button class="lb-btn lb-btn-copy" onclick="lbCopy()">📋 Copiar</button>
    <button class="lb-btn lb-btn-dl" onclick="lbDownload()">⬇ Baixar</button>
  </div>
</div>



<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────
const MODELS = [{"id": "iphone11", "name": "iPhone 11", "gen": "11", "year": 2019}, {"id": "iphone11pro", "name": "iPhone 11 Pro", "gen": "11", "year": 2019}, {"id": "iphone11promax", "name": "iPhone 11 Pro Max", "gen": "11", "year": 2019}, {"id": "iphone12mini", "name": "iPhone 12 Mini", "gen": "12", "year": 2020}, {"id": "iphone12", "name": "iPhone 12", "gen": "12", "year": 2020}, {"id": "iphone12pro", "name": "iPhone 12 Pro", "gen": "12", "year": 2020}, {"id": "iphone12promax", "name": "iPhone 12 Pro Max", "gen": "12", "year": 2020}, {"id": "iphone13mini", "name": "iPhone 13 Mini", "gen": "13", "year": 2021}, {"id": "iphone13", "name": "iPhone 13", "gen": "13", "year": 2021}, {"id": "iphone13pro", "name": "iPhone 13 Pro", "gen": "13", "year": 2021}, {"id": "iphone13promax", "name": "iPhone 13 Pro Max", "gen": "13", "year": 2021}, {"id": "iphone14", "name": "iPhone 14", "gen": "14", "year": 2022}, {"id": "iphone14plus", "name": "iPhone 14 Plus", "gen": "14", "year": 2022}, {"id": "iphone14pro", "name": "iPhone 14 Pro", "gen": "14", "year": 2022}, {"id": "iphone14promax", "name": "iPhone 14 Pro Max", "gen": "14", "year": 2022}, {"id": "iphone15", "name": "iPhone 15", "gen": "15", "year": 2023}, {"id": "iphone15plus", "name": "iPhone 15 Plus", "gen": "15", "year": 2023}, {"id": "iphone15pro", "name": "iPhone 15 Pro", "gen": "15", "year": 2023}, {"id": "iphone15promax", "name": "iPhone 15 Pro Max", "gen": "15", "year": 2023}, {"id": "iphone16", "name": "iPhone 16", "gen": "16", "year": 2024}, {"id": "iphone16plus", "name": "iPhone 16 Plus", "gen": "16", "year": 2024}, {"id": "iphone16pro", "name": "iPhone 16 Pro", "gen": "16", "year": 2024}, {"id": "iphone16promax", "name": "iPhone 16 Pro Max", "gen": "16", "year": 2024}, {"id": "iphone17", "name": "iPhone 17", "gen": "17", "year": 2025}, {"id": "iphone17air", "name": "iPhone 17 Air", "gen": "17", "year": 2025}, {"id": "iphone17pro", "name": "iPhone 17 Pro", "gen": "17", "year": 2025}, {"id": "iphone17promax", "name": "iPhone 17 Pro Max", "gen": "17", "year": 2025}];
const GENERATIONS = {"11": {"label": "iPhone 11", "color": "#6c6c70"}, "12": {"label": "iPhone 12", "color": "#2c2c2e"}, "13": {"label": "iPhone 13", "color": "#1c1c1e"}, "14": {"label": "iPhone 14", "color": "#3a3a3c"}, "15": {"label": "iPhone 15", "color": "#48484a"}, "16": {"label": "iPhone 16", "color": "#636366"}, "17": {"label": "iPhone 17", "color": "#b8964e"}};

let PHOTOS = {}; // { modelId: { photoId: {url, caption, ts} } }
let _fbMode = false;
let _currentModel = null;
let _upFiles = []; // { file, previewUrl, compressed }
let _filterGen = 'all';
let _searchQ = '';
let _lbPhotos = [];
let _lbIdx = 0;
let _editMode = false;

const $ = id => document.getElementById(id);
function toast(msg,dur=2200){ const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur); }
function haptic(p=[12]){ try{navigator.vibrate&&navigator.vibrate(p);}catch(e){} }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// ── DARK MODE ─────────────────────────────────────────────────────
function toggleDark(){
  const d=document.body.classList.toggle('dark');
  $('dark-btn').textContent=d?'☀️':'🌙';
  try{localStorage.setItem('acess_dark',d?'1':'0');}catch(e){}
}
function initDark(){
  try{
    const p=localStorage.getItem('acess_dark');
    const sys=window.matchMedia('(prefers-color-scheme: dark)').matches;
    if(p==='1'||(p===null&&sys)){document.body.classList.add('dark');$('dark-btn').textContent='☀️';}
  }catch(e){}
}

// ── FIREBASE ──────────────────────────────────────────────────────
function initFirebase(){
  if(!window._fbOK||!window._fb){ loadLocal(); return; }
  _fbMode=true;
  setSyncBar('online','🟢 Em tempo real — sincronizado');
  const {onValue,ref,db}=window._fb;
  onValue(ref(db,'acess_vitrine'),snap=>{
    PHOTOS=snap.val()||{};
    try{localStorage.setItem('acess_vitrine',JSON.stringify(PHOTOS));}catch(e){}
    renderGrid();
    if(_currentModel) renderDetail(_currentModel);
  });
}
function loadLocal(){
  try{PHOTOS=JSON.parse(localStorage.getItem('acess_vitrine')||'{}');}catch(e){PHOTOS={};}
  renderGrid();
}
function setSyncBar(type,msg){ const b=$('sync-bar');b.className=`sync-bar ${type}`;b.textContent=msg; }

async function persistPhoto(modelId,photoData,caption){
  const id=uid();
  const entry={url:photoData,caption:caption||'',ts:Date.now()};
  if(_fbMode&&window._fb){
    const {ref,set,db}=window._fb;
    await set(ref(db,`acess_vitrine/${modelId}/${id}`),entry);
  } else {
    if(!PHOTOS[modelId]) PHOTOS[modelId]={};
    PHOTOS[modelId][id]=entry;
    try{localStorage.setItem('acess_vitrine',JSON.stringify(PHOTOS));}catch(e){}
    renderGrid();
    if(_currentModel===modelId) renderDetail(modelId);
  }
}
async function deletePhoto(modelId,photoId){
  if(_fbMode&&window._fb){
    const {ref,remove,db}=window._fb;
    await remove(ref(db,`acess_vitrine/${modelId}/${photoId}`));
  } else {
    if(PHOTOS[modelId]) delete PHOTOS[modelId][photoId];
    try{localStorage.setItem('acess_vitrine',JSON.stringify(PHOTOS));}catch(e){}
    renderGrid();
    if(_currentModel===modelId) renderDetail(modelId);
  }
  toast('🗑️ Foto removida');
}

// ── RENDER GRID ───────────────────────────────────────────────────
function renderGrid(){
  // Gen chips
  const genScroll=$('gen-scroll');
  const genKeys=['all',...Object.keys(GENERATIONS)];
  genScroll.innerHTML=genKeys.map(g=>{
    const label=g==='all'?'Todos':GENERATIONS[g].label.replace('iPhone ','');
    const isActive=_filterGen===g;
    const color=g==='all'?'#0a0a0a':(GENERATIONS[g]?.color||'#333');
    return `<div class="gen-chip${isActive?' active':''}" style="${isActive?`background:${color};border-color:${color}`:''}" onclick="filterGen('${g}')">${label}</div>`;
  }).join('');

  // Group models by gen
  const grid=$('main-grid');
  const q=_searchQ.toLowerCase();
  const groupedGens=Object.keys(GENERATIONS);

  let html='';
  groupedGens.forEach(gen=>{
    if(_filterGen!=='all'&&_filterGen!==gen) return;
    const genModels=MODELS.filter(m=>m.gen===gen&&(!q||m.name.toLowerCase().includes(q)));
    if(!genModels.length) return;
    const g=GENERATIONS[gen];
    html+=`<div class="gen-section" id="gen-${gen}">
      <div class="gen-hdr">
        <div class="gen-badge" style="background:${g.color}">📱</div>
        <div class="gen-label">${g.label}</div>
        <div class="gen-year">${genModels[0].year}</div>
      </div>
      <div class="models-scroll">
        ${genModels.map(m=>{
          const photos=PHOTOS[m.id]?Object.values(PHOTOS[m.id]):[];
          const count=photos.length;
          const thumb=count>0?photos.sort((a,b)=>b.ts-a.ts)[0].url:'';
          return `<div class="model-card" onclick="openDetail('${m.id}')">
            <div class="model-thumb">
              ${thumb
                ?`<img class="model-thumb-img" src="${thumb}" loading="lazy" alt="${m.name}">`
                :`<div class="model-thumb-empty"><div class="model-thumb-empty-ico">📷</div><div class="model-thumb-empty-txt">Sem fotos</div></div>`
              }
              ${count>0?`<div class="model-count-badge">${count} foto${count>1?'s':''}</div>`:''}
            </div>
            <div class="model-info">
              <div class="model-name">${m.name.replace('iPhone ','')}</div>
              <div class="model-year">${m.year}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  if(!html) html=`<div style="padding:60px 20px;text-align:center">
    <div style="font-size:40px;opacity:.2">🔍</div>
    <div style="font-size:14px;color:var(--soft);margin-top:12px">Nenhum modelo encontrado</div>
  </div>`;
  grid.innerHTML=html;
}

// ── DETAIL VIEW ───────────────────────────────────────────────────
function openDetail(modelId){
  _currentModel=modelId;
  _editMode=false;
  const model=MODELS.find(m=>m.id===modelId);
  $('detail-title').textContent=model?model.name:'Modelo';
  $('edit-mode-btn').textContent='✏️';
  $('detail-body').classList.remove('edit-mode');
  renderDetail(modelId);
  $('detail-view').classList.add('open');
  haptic(8);
}
function closeDetail(){
  $('detail-view').classList.remove('open');
  _currentModel=null;
  _editMode=false;
  $('detail-body').classList.remove('edit-mode');
}
function toggleEditMode(){
  _editMode=!_editMode;
  $('detail-body').classList.toggle('edit-mode',_editMode);
  $('edit-mode-btn').textContent=_editMode?'✓':'✏️';
  if(!_editMode) toast('Edição concluída');
}
function renderDetail(modelId){
  const photos=PHOTOS[modelId]?Object.entries(PHOTOS[modelId]).sort((a,b)=>b[1].ts-a[1].ts):[];
  $('detail-sub').textContent=`${photos.length} foto${photos.length!==1?'s':''}`;
  const grid=$('photo-grid');

  if(!photos.length){
    $('detail-body').innerHTML=`<div class="detail-empty">
      <div class="detail-empty-ico">📷</div>
      <div class="detail-empty-title">Sem fotos ainda</div>
      <div class="detail-empty-sub">Toque em + para adicionar as primeiras fotos deste modelo</div>
    </div>
    <div class="photo-grid" id="photo-grid"></div>`;
    return;
  }

  // Rebuild grid
  let html=photos.map(([pid,p],i)=>`
    <div class="photo-cell" data-pid="${pid}" onclick="openLb(${i})">
      <img src="${p.url}" loading="lazy" alt="">
      ${p.caption?`<div class="photo-cell-caption">${p.caption}</div>`:''}
      <button class="photo-delete" onclick="event.stopPropagation();confirmDelete('${modelId}','${pid}')">✕</button>
    </div>`).join('');
  html+=`<div class="upload-cell" onclick="openUpload()">
    <div class="upload-cell-ico">+</div>
    <div class="upload-cell-txt">Adicionar</div>
  </div>`;

  // Keep detail-body structure
  $('detail-body').innerHTML=`<div class="photo-grid" id="photo-grid">${html}</div>`;
  if(_editMode) $('detail-body').classList.add('edit-mode');

  // Store for lightbox
  _lbPhotos=photos.map(([pid,p])=>({pid,url:p.url,caption:p.caption||''}));
}

function confirmDelete(modelId,photoId){
  if(confirm('Remover esta foto?')) deletePhoto(modelId,photoId);
}

// ── UPLOAD ────────────────────────────────────────────────────────
function openUpload(){
  _upFiles=[];
  $('up-title').textContent=`Adicionar Fotos`;
  const model=MODELS.find(m=>m.id===_currentModel);
  $('up-sub').textContent=model?`${model.name}`:'';
  $('up-preview-grid').innerHTML='';
  $('f-caption').value='';
  $('up-info').textContent='';
  $('btn-save-photos').disabled=true;
  $('up-overlay').classList.add('open');
}
function closeUpload(){ $('up-overlay').classList.remove('open'); _upFiles=[]; }

function handleFiles(e){
  const files=Array.from(e.target.files);
  if(!files.length) return;
  files.forEach(f=>{
    const url=URL.createObjectURL(f);
    _upFiles.push({file:f,previewUrl:url,compressed:null});
  });
  renderUpPreviews();
  $('btn-save-photos').disabled=false;
  $('up-info').textContent=`${_upFiles.length} foto${_upFiles.length>1?'s':''} selecionada${_upFiles.length>1?'s':''}`;
  $('up-input').value='';
}

function renderUpPreviews(){
  $('up-preview-grid').innerHTML=_upFiles.map((f,i)=>`
    <div class="up-prev-cell">
      <img src="${f.previewUrl}" alt="">
      <button class="up-prev-remove" onclick="removeUpFile(${i})">✕</button>
    </div>`).join('');
}
function removeUpFile(i){ _upFiles.splice(i,1); renderUpPreviews(); if(!_upFiles.length) $('btn-save-photos').disabled=true; }

function compressImage(file,maxW=1200,q=0.75){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      let {width:w,height:h}=img;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(img.src);
      res(c.toDataURL('image/jpeg',q));
    };
    img.src=URL.createObjectURL(file);
  });
}

async function savePhotos(){
  if(!_upFiles.length||!_currentModel) return;
  const btn=$('btn-save-photos');
  btn.disabled=true; btn.textContent='Comprimindo...';
  const caption=$('f-caption').value.trim();
  try{
    for(let i=0;i<_upFiles.length;i++){
      btn.textContent=`Salvando ${i+1}/${_upFiles.length}...`;
      const compressed=await compressImage(_upFiles[i].file);
      await persistPhoto(_currentModel,compressed,caption);
    }
    closeUpload();
    toast(`✓ ${_upFiles.length} foto${_upFiles.length>1?'s':''} salva${_upFiles.length>1?'s':''}`);
    haptic([12,5,12]);
  }catch(err){
    toast('Erro ao salvar. Tente novamente.');
    console.error(err);
  }
  btn.disabled=false; btn.textContent='Salvar Fotos';
}

// ── LIGHTBOX ──────────────────────────────────────────────────────
function openLb(idx){
  if(!_lbPhotos.length) return;
  _lbIdx=idx;
  renderLb();
  const ov=$('lb-overlay');
  ov.style.display='flex';
  requestAnimationFrame(()=>ov.classList.add('open'));
  initLbSwipe();
}
function closeLb(){
  $('lb-overlay').classList.remove('open');
  setTimeout(()=>{ $('lb-overlay').style.display='none'; },250);
}
function renderLb(){
  const p=_lbPhotos[_lbIdx];
  if(!p) return;
  const model=MODELS.find(m=>m.id===_currentModel);
  $('lb-title').textContent=model?model.name:'';
  $('lb-caption').textContent=p.caption||'';
  $('lb-img').src=p.url;
  $('lb-counter').textContent=`${_lbIdx+1} / ${_lbPhotos.length}`;
  $('lb-prev').style.display=_lbIdx>0?'flex':'none';
  $('lb-next').style.display=_lbIdx<_lbPhotos.length-1?'flex':'none';
}
function lbNav(dir){
  _lbIdx=Math.max(0,Math.min(_lbPhotos.length-1,_lbIdx+dir));
  renderLb(); haptic(6);
}

function initLbSwipe(){
  const wrap=$('lb-img-wrap');
  let sx=0;
  wrap.ontouchstart=e=>{ sx=e.touches[0].clientX; };
  wrap.ontouchend=e=>{
    const dx=e.changedTouches[0].clientX-sx;
    if(Math.abs(dx)>50){ lbNav(dx<0?1:-1); }
  };
}

function lbWhatsApp(){
  const p=_lbPhotos[_lbIdx]; if(!p) return;
  const model=MODELS.find(m=>m.id===_currentModel);
  const text=`${model?model.name:'iPhone'}${p.caption?' — '+p.caption:''}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)},'_blank'`);
  // Also try to copy the image
  toast('💬 Abrindo WhatsApp...');
}
function lbCopy(){
  // Copy the data URL to clipboard as text link workaround
  const p=_lbPhotos[_lbIdx]; if(!p) return;
  navigator.clipboard.writeText(p.url).then(()=>toast('📋 Imagem copiada!')).catch(()=>toast('Use Baixar para salvar a foto'));
}
function lbDownload(){
  const p=_lbPhotos[_lbIdx]; if(!p) return;
  const model=MODELS.find(m=>m.id===_currentModel);
  const a=document.createElement('a');
  a.href=p.url;
  a.download=`acess-${model?model.id:'iphone'}-${Date.now()}.jpg`;
  a.click();
  toast('📥 Download iniciado');
}

// ── SEARCH & FILTER ───────────────────────────────────────────────
function onSearch(q){ _searchQ=q; renderGrid(); }
function filterGen(g){ _filterGen=g; renderGrid(); }





// ── SAFETY FALLBACK ──────────────────────────────────────────────
// If Firebase CDN fails or event misfires, show app after 6s
setTimeout(function(){
  var ld = document.getElementById('loading');
  if(ld && ld.style.display !== 'none'){
    window._fbOK = false;
    window._fbReady = true;
    document.dispatchEvent(new Event('fb-ready'));
  }
}, 6000);
</script>
